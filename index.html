<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>Yap'Ay Zeka Analiz Sistemi</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;600;800&display=swap" rel="stylesheet">
<style>
body{
    margin:0;
    font-family:'Poppins',sans-serif;
    background: linear-gradient(135deg,#6a00ff,#b026ff,#ff5eea);
    background-size:400% 400%;
    animation: gradientMove 15s ease infinite;
    color:white;
    text-align:center;
}
@keyframes gradientMove{
    0%{background-position:0% 50%;}
    50%{background-position:100% 50%;}
    100%{background-position:0% 50%;}
}
.container{
    width:80%;
    margin:auto;
}
h1{
    font-size:64px;
    margin-top:40px;
    font-weight:800;
    letter-spacing:2px;
    text-shadow:0 0 25px rgba(255,255,255,0.7);
}
textarea{
    width:70%;
    height:160px;
    border:none;
    border-radius:18px;
    padding:20px;
    font-size:18px;
    resize:none;
    margin-top:40px;
    outline:none;
}
button{
    margin-top:25px;
    padding:18px 50px;
    font-size:20px;
    border:none;
    border-radius:14px;
    background:#ffd6f9;
    color:#4a0072;
    font-weight:600;
    cursor:pointer;
    box-shadow:0 8px 25px rgba(0,0,0,0.3);
    transition:0.3s;
}
button:hover{
    transform:scale(1.08);
    background:#fff;
}
.result-area{
    margin-top:60px;
    display:flex;
    justify-content:center;
    align-items:center;
    gap:40px;
}
img{
    width:300px;  
    border-radius:20px;
    box-shadow:0 0 35px rgba(0,0,0,0.5);
}
.comment{
    max-width:400px;
    font-size:22px;
    text-align:left;
    line-height:1.6;
    background:rgba(255,255,255,0.15);
    padding:25px;
    border-radius:18px;
    backdrop-filter:blur(10px);
}
.label{
    font-weight:600;
    margin-bottom:10px;
}
</style>
</head>
<body>
<div class="container">
<h1>Yap'Ay Zeka Metin Analiz Sistemi</h1>

<form method="POST" action="/predict">
<textarea name="text_input" placeholder="Metni buraya yapıştır...">{{ text_input or '' }}</textarea><br>
<button type="submit">Metni Sorgula</button>
</form>

{% if prediction %}
<div class="result-area">
<img src="{{ grafik }}" alt="Grafik">
<div class="comment">
<div class="label">👤 İnsan Yazım Oranı: {{ human }}</div>
<div class="label">🤖 Yapay Zeka Oranı: {{ ai }}</div>
<p>{{ yorum }}</p>
</div>
</div>
{% endif %}
</div>
</body>
</html>
